<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>netscope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: monospace;
      height: 100vh;
      overflow: hidden;
    }
    #controls {
      position: absolute;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }
    input[type="number"] {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #ccc;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 13px;
      width: 100px;
      border-radius: 4px;
    }
    button {
      background: #1a1a1a;
      border: 1px solid #444;
      color: #ccc;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { border-color: #888; color: #fff; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { font-size: 12px; color: #555; }
    #graph { width: 100vw; height: 100vh; }
    .tooltip {
      position: absolute;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.8;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      color: #ccc;
    }
    .country { fill: #111; stroke: #2a2a2a; stroke-width: 0.5px; }
    .graticule { fill: none; stroke: #1a1a1a; stroke-width: 0.3px; }
  </style>
</head>
<body>

<div id="controls">
  <input type="number" id="duration" value="5000" min="1000" step="1000" />
  <button id="scanBtn" onclick="startScan()">scan</button>
  <span id="status"></span>
</div>

<svg id="graph"></svg>
<div class="tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
  const svg = d3.select("#graph")
  const width = window.innerWidth
  const height = window.innerHeight
  const tooltip = document.getElementById("tooltip")

  svg.attr("viewBox", [0, 0, width, height])

  const colorScale = d3.scaleOrdinal(d3.schemeTableau10)

  function nodeColor(d) {
    if (d.country === "local") return "#444"
    return colorScale(d.country)
  }

  // geo projection — natural earth is nicely minimal
  const projection = d3.geoNaturalEarth1()
    .scale(width / 6.5)
    .translate([width / 2, height / 2])

  const geoPath = d3.geoPath().projection(projection)

  // zoom + pan
  const container = svg.append("g")
  svg.call(d3.zoom()
    .scaleExtent([0.5, 20])
    .on("zoom", event => container.attr("transform", event.transform))
  )

  // draw map on load
  async function drawMap() {
    const world = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
    const countries = topojson.feature(world, world.objects.countries)

    container.append("g").selectAll("path")
      .data(countries.features)
      .enter().append("path")
      .attr("class", "country")
      .attr("d", geoPath)

    // graticule grid lines
    container.append("path")
      .datum(d3.geoGraticule()())
      .attr("class", "graticule")
      .attr("d", geoPath)
  }

  async function startScan() {
    const btn = document.getElementById("scanBtn")
    const status = document.getElementById("status")
    const duration = document.getElementById("duration").value

    btn.disabled = true
    status.textContent = `scanning for ${duration / 1000}s...`

    await fetch(`/scan?duration=${duration}`, { method: "POST" })

    status.textContent = "fetching graph..."
    const res = await fetch("/graph")
    const data = await res.json()

    status.textContent = `${data.nodes.length} nodes, ${data.edges.length} edges`
    btn.disabled = false

    renderGraph(data)
  }

  function renderGraph(data) {
    // remove previous graph elements but keep the map
    container.selectAll(".graph-layer").remove()
    d3.select("#legend").remove()

    // filter out nodes with no coordinates (local nodes)
    const geoNodes = data.nodes.filter(d => d.lat !== 0 && d.lon !== 0)
    const localNodes = data.nodes.filter(d => d.lat === 0 || d.lon === 0)
    const allNodes = [...geoNodes, ...localNodes]

    // position geo nodes on map, cluster local nodes in corner
    allNodes.forEach((d, i) => {
      if (d.lat && d.lon && (d.lat !== 0 || d.lon !== 0)) {
        const [x, y] = projection([d.lon, d.lat])
        d.x = x
        d.y = y
      } else {
        // local nodes cluster bottom left
        d.x = 80 + (i % 4) * 40
        d.y = height - 80
      }
    })

    // build node lookup for edges
    const nodeById = Object.fromEntries(allNodes.map(d => [d.ip, d]))

    const maxCount = d3.max(data.edges, e => e.count) || 1

    const graphLayer = container.append("g").attr("class", "graph-layer")

    // edges
    graphLayer.append("defs").append("marker")
      .attr("id", "arrow")
      .attr("viewBox", "0 0 10 10")
      .attr("refX", 18).attr("refY", 5)
      .attr("markerWidth", 6).attr("markerHeight", 6)
      .attr("orient", "auto-start-reverse")
      .append("path")
      .attr("d", "M2 1L8 5L2 9")
      .attr("fill", "none")
      .attr("stroke", "#555")
      .attr("stroke-width", 1.5)

    graphLayer.append("g").selectAll("line")
      .data(data.edges)
      .enter().append("line")
      .attr("stroke", "#333")
      .attr("stroke-width", d => 1 + (d.count / maxCount) * 4)
      .attr("marker-end", "url(#arrow)")
      .attr("x1", d => nodeById[d.from]?.x ?? 0)
      .attr("y1", d => nodeById[d.from]?.y ?? 0)
      .attr("x2", d => nodeById[d.to]?.x ?? 0)
      .attr("y2", d => nodeById[d.to]?.y ?? 0)

    // nodes
    graphLayer.append("g").selectAll("circle")
      .data(allNodes)
      .enter().append("circle")
      .attr("r", 5)
      .attr("cx", d => d.x)
      .attr("cy", d => d.y)
      .attr("fill", nodeColor)
      .attr("stroke", d => d.country === "local" ? "#666" : "#fff")
      .attr("stroke-width", 0.5)
      .style("cursor", "pointer")
      .on("mouseover", (event, d) => {
        tooltip.style.opacity = 1
        tooltip.innerHTML = [
          `<b>${d.ip}</b>`,
          d.city !== "local network" ? `${d.city}, ${d.country}` : "local network",
          d.org || ""
        ].filter(Boolean).join("<br>")
      })
      .on("mousemove", event => {
        tooltip.style.left = (event.pageX + 14) + "px"
        tooltip.style.top  = (event.pageY - 10) + "px"
      })
      .on("mouseout", () => { tooltip.style.opacity = 0 })

    // labels
    graphLayer.append("g").selectAll("text")
      .data(allNodes)
      .enter().append("text")
      .text(d => d.ip)
      .attr("x", d => d.x + 7)
      .attr("y", d => d.y + 4)
      .attr("font-size", 9)
      .attr("font-family", "monospace")
      .attr("fill", "#555")
      .style("pointer-events", "none")

    // legend
    const countries = [...new Set(allNodes.map(d => d.country))]
    const legend = d3.select("body").append("div")
      .attr("id", "legend")
      .style("position", "absolute")
      .style("top", "24px")
      .style("right", "24px")
      .style("background", "#1a1a1a")
      .style("border", "1px solid #333")
      .style("border-radius", "4px")
      .style("padding", "12px 16px")
      .style("font-size", "12px")
      .style("line-height", "2")
      .style("font-family", "monospace")

    countries.forEach(country => {
      const row = legend.append("div").style("display", "flex").style("align-items", "center").style("gap", "8px")
      row.append("div")
        .style("width", "10px").style("height", "10px")
        .style("border-radius", "50%")
        .style("background", country === "local" ? "#444" : colorScale(country))
        .style("border", "1px solid #666")
        .style("flex-shrink", "0")
      row.append("span").style("color", "#999").text(country)
    })
  }

  // load map immediately on page load
  drawMap()
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
</body>
</html>
